on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-latest-large

    runs-on: ${{matrix.os}}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up JDK 25
      uses: actions/setup-java@v5.4.0
      with:
        java-version: '25'
        distribution: 'microsoft'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6.2.0
      with:
        gradle-version: '9.6.1'

    - name: Build with Gradle Wrapper
      run: gradle build

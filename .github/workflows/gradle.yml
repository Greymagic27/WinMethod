name: Build

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Set up JDK 26
        uses: actions/setup-java@v5.5.0
        with:
          java-version: '26'
          distribution: 'oracle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: current

      - name: Build with Gradle
        run: gradle build
name: Javadocs
on:
  push:
    branches: [ "*" ]
jobs:
  docs:
    runs-on: windows-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.5.0
        with:
          java-version: '25'
          distribution: 'microsoft'
      - run: gradle javadoc
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: build/docs/javadoc
      - uses: actions/deploy-pages@v5.0.0
